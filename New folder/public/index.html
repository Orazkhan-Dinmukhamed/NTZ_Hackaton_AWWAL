<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель администратора — SözType</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    

    :root {
      --blue:        #008AE5;
      --blue-dark:   #006BBF;
      --blue-light:  #E8F4FD;
      --blue-glow:   rgba(0,138,229,.18);
      --green:       #17B26A;
      --green-bg:    #ECFDF5;
      --orange:      #F79009;
      --orange-bg:   #FFFAEB;
      --red:         #F04438;
      --red-bg:      #FEF3F2;
      --purple:      #7C3AED;
      --purple-bg:   #F5F3FF;
      --gray-50:     #F9FAFB;
      --gray-100:    #F3F4F6;
      --gray-200:    #E5E7EB;
      --gray-300:    #D1D5DB;
      --gray-400:    #9CA3AF;
      --gray-500:    #6B7280;
      --gray-600:    #4B5563;
      --gray-700:    #374151;
      --gray-800:    #1F2937;
      --gray-900:    #111827;
      --sidebar-w:   320px;
      --header-h:    60px;
      --radius:      12px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07);
      --shadow:      0 4px 16px rgba(0,0,0,.08);
    }

    html, body { height: 100%; }
    body {
      font-family: 'Golos Text', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 200;
      box-shadow: var(--shadow-sm);
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 34px; height: 34px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .logo-name { font-size: 16px; font-weight: 700; color: var(--gray-900); }
    .logo-name span { color: var(--blue); }
    .admin-badge {
      background: #111827;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stats-pill {
      display: flex;
      gap: 2px;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 4px 6px;
    }
    .stat-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 16px;
    }
    .stat-chip.total    { color: var(--gray-700); }
    .stat-chip.pending  { background: var(--orange-bg); color: var(--orange); }
    .stat-chip.approved { background: var(--green-bg);  color: var(--green); }
    .stat-chip.rejected { background: var(--red-bg);    color: var(--red); }

    .btn-refresh {
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all .2s;
    }
    .btn-refresh:hover { background: var(--gray-200); }
    .btn-refresh svg { transition: transform .5s; }
    .btn-refresh.spinning svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - var(--header-h));
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 16px;
      border-bottom: 1px solid var(--gray-100);
    }
    .sidebar-head h2 { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-family: 'Golos Text', sans-serif;
      font-size: 13px;
      color: var(--gray-800);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); pointer-events: none;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--gray-100);
    }
    .tab {
      flex: 1;
      padding: 5px 4px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      color: var(--gray-500);
      background: none;
      transition: all .15s;
    }
    .tab.active { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
    .tab:hover:not(.active) { background: var(--gray-100); color: var(--gray-700); }

    .project-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .project-list::-webkit-scrollbar { width: 4px; }
    .project-list::-webkit-scrollbar-track { background: transparent; }
    .project-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

    .project-card {
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 4px;
      position: relative;
    }
    .project-card:hover { background: var(--gray-50); border-color: var(--gray-200); }
    .project-card.active { background: var(--blue-light); border-color: var(--blue); }

    .pc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .pc-name { font-size: 13px; font-weight: 600; color: var(--gray-900); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .status-badge.pending  { background: var(--orange-bg); color: var(--orange); }
    .status-badge.approved { background: var(--green-bg);  color: var(--green); }
    .status-badge.rejected { background: var(--red-bg);    color: var(--red); }
    .pc-author { font-size: 12px; color: var(--gray-500); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-date   { font-size: 11px; color: var(--gray-400); }
    .pc-score {
      position: absolute;
      right: 12px; bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-400);
    }
    .pc-score.high { color: var(--green); }
    .pc-score.mid  { color: var(--orange); }
    .pc-score.low  { color: var(--red); }

    .empty-list {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
      font-size: 13px;
    }
    .empty-list svg { margin-bottom: 10px; opacity: .4; }

    /* ── Main panel ──────────────────────────────────────────────────────── */
    .main-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .main-panel::-webkit-scrollbar { width: 6px; }
    .main-panel::-webkit-scrollbar-track { background: transparent; }
    .main-panel::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--gray-400);
      text-align: center;
    }
    .empty-state svg { margin-bottom: 16px; opacity: .3; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--gray-500); margin-bottom: 6px; }
    .empty-state p  { font-size: 13px; }

    /* ── Detail view ─────────────────────────────────────────────────────── */
    .detail { max-width: 800px; }
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .detail-title { font-size: 22px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; line-height: 1.3; }
    .detail-meta  { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .meta-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--gray-600);
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 3px 9px;
    }

    /* ── Section card ────────────────────────────────────────────────────── */
    .section {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-800);
      display: flex; align-items: center; gap: 8px;
    }
    .section-body { padding: 18px; }

    /* ── Info grid ───────────────────────────────────────────────────────── */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
    .info-item .label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .info-item .value { font-size: 14px; color: var(--gray-800); font-weight: 500; }
    .info-item .value.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    .file-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--blue);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      background: var(--blue-light);
      border-radius: 8px;
      transition: all .2s;
    }
    .file-link:hover { background: #d0eaf9; }

    .desc-text {
      font-size: 13px;
      color: var(--gray-700);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    /* ── AI Analyze button ───────────────────────────────────────────────── */
    .btn-analyze {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--blue);
      color: #fff;
      font-family: 'Golos Text', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-analyze:hover:not(:disabled) { background: var(--blue-dark); box-shadow: 0 4px 14px rgba(0,138,229,.3); }
    .btn-analyze:disabled { opacity: .6; cursor: not-allowed; }
    .btn-analyze .spinner2 {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: none;
    }
    .btn-analyze.loading .spinner2 { display: block; }

    /* ── Analysis results ────────────────────────────────────────────────── */
    .score-ring {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .ring-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg  { fill: none; stroke: var(--gray-100); stroke-width: 8; }
    .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
    .ring-fill.high { stroke: var(--green); }
    .ring-fill.mid  { stroke: var(--orange); }
    .ring-fill.low  { stroke: var(--red); }
    .ring-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .ring-score { font-size: 22px; font-weight: 700; color: var(--gray-900); font-family: 'JetBrains Mono', monospace; }
    .ring-label { font-size: 10px; color: var(--gray-400); font-weight: 600; }
    .score-info h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .score-info h4.approved { color: var(--green); }
    .score-info h4.needs_revision { color: var(--orange); }
    .score-info h4.rejected { color: var(--red); }
    .score-info p { font-size: 13px; color: var(--gray-600); line-height: 1.5; }

    /* Criteria grid */
    .criteria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    @media (max-width: 600px) { .criteria-grid { grid-template-columns: 1fr; } }
    .criterion {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
    }
    .crit-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 1px; }
    .crit-dot.pass { background: var(--green-bg); color: var(--green); }
    .crit-dot.fail { background: var(--red-bg);   color: var(--red); }
    .crit-info .crit-name { font-size: 12px; font-weight: 700; color: var(--gray-800); margin-bottom: 2px; }
    .crit-info .crit-score { font-size: 11px; font-weight: 600; color: var(--gray-500); margin-bottom: 2px; }
    .crit-info .crit-comment { font-size: 11px; color: var(--gray-500); line-height: 1.4; }

    /* Errors/warnings */
    .issue-list { display: flex; flex-direction: column; gap: 6px; }
    .issue-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    .issue-item.error   { background: var(--red-bg);    color: #7F1D1D; border-left: 3px solid var(--red); }
    .issue-item.warning { background: var(--orange-bg); color: #78350F; border-left: 3px solid var(--orange); }

    /* Summary */
    .summary-text {
      font-size: 13px;
      color: var(--gray-700);
      line-height: 1.7;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 14px 16px;
    }

    /* ── Actions ─────────────────────────────────────────────────────────── */
    .actions-row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }

    .btn-approve, .btn-reject {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px;
      font-family: 'Golos Text', sans-serif;
      font-size: 14px; font-weight: 700;
      border-radius: 10px; border: none; cursor: pointer;
      transition: all .2s;
    }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-approve:hover:not(:disabled) { background: #0E9855; box-shadow: 0 4px 12px rgba(23,178,106,.3); }
    .btn-reject  { background: var(--red-bg); color: var(--red); border: 1.5px solid #FECACA; }
    .btn-reject:hover:not(:disabled)  { background: #FEE2E2; }
    .btn-approve:disabled, .btn-reject:disabled { opacity: .5; cursor: not-allowed; }

    .reject-form { display: none; width: 100%; margin-top: 12px; }
    .reject-form.show { display: block; }
    .reject-form textarea {
      width: 100%;
      font-family: 'Golos Text', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      color: var(--gray-800);
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 8px;
    }
    .reject-form textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(240,68,56,.12); }
    .btn-reject-confirm {
      padding: 8px 18px;
      background: var(--red);
      color: #fff;
      font-family: 'Golos Text', sans-serif;
      font-size: 13px; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer;
      transition: all .2s;
    }
    .btn-reject-confirm:hover { background: #C0392B; }

    .decision-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px; font-weight: 700;
    }
    .decision-badge.approved { background: var(--green-bg); color: var(--green); }
    .decision-badge.rejected { background: var(--red-bg);   color: var(--red); }
    .rejection-reason-box {
      margin-top: 10px;
      padding: 10px 14px;
      background: var(--red-bg);
      border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #7F1D1D;
    }

    /* ── Toast ────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s ease;
      z-index: 999;
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: #111827; color: #fff; }
    #toast.error   { background: var(--red); color: #fff; }

    /* ── Loading overlay ─────────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      backdrop-filter: blur(2px);
    }
    .loader-dots { display: flex; gap: 8px; }
    .loader-dots span {
      width: 10px; height: 10px;
      background: var(--blue);
      border-radius: 50%;
      animation: bounce .8s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: .15s; }
    .loader-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,100%{transform:scale(.6);opacity:.4} 50%{transform:scale(1);opacity:1} }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">
  <div class="logo-mark">
    <img src="/Frame 4.png" alt="Logo" width="25" height="25">
  </div>
</div>

    <div class="logo-name">Söz<span>Type</span></div>
    <div class="admin-badge">AI</div>
  </div>

  <div class="header-right">
    <div class="stats-pill">
      <div class="stat-chip total" id="stat-total">Всего: 0</div>
      <div class="stat-chip pending"  id="stat-pending">На рассмотрении: 0</div>
      <div class="stat-chip approved" id="stat-approved">Одобрено: 0</div>
      <div class="stat-chip rejected" id="stat-rejected">Отклонено: 0</div>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadProjects()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
      </svg>
      Обновить
    </button>
  </div>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>Заявки</h2>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Поиск по проекту, ФИО..." oninput="filterList()" />
      </div>
    </div>
    <div class="filter-tabs">
      <button class="tab active" data-filter="all"      onclick="setFilter('all',this)">Все</button>
      <button class="tab"        data-filter="pending"  onclick="setFilter('pending',this)">На рассм.</button>
      <button class="tab"        data-filter="approved" onclick="setFilter('approved',this)">Одобрен</button>
      <button class="tab"        data-filter="rejected" onclick="setFilter('rejected',this)">Отклонён</button>
    </div>
    <div class="project-list" id="project-list">
      <div class="empty-list">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 2H4a2 2 0 00-2 2v16a2 2 0 002 2h16a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <div>Загрузка заявок...</div>
      </div>
    </div>
  </aside>

  <!-- Main panel -->
  <main class="main-panel" id="main-panel">
    <div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M9 2H4a2 2 0 00-2 2v16a2 2 0 002 2h16a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="15" y2="17"/>
      </svg>
      <h3>Выберите заявку</h3>
      <p>Нажмите на проект слева для просмотра деталей</p>
    </div>
  </main>
</div>

<script>
  /* ── State ───────────────────────────────────────────────────────────── */
  const API = '';
  let allProjects   = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let activeId      = null;

  const STATUS_LABELS = {
    pending:  'На рассмотрении',
    approved: 'Одобрен',
    rejected: 'Отклонён',
  };
  const CRITERIA_NAMES = {
    strategic_relevance:  'Стратегическая релевантность',
    goal_and_tasks:       'Цель и задачи',
    scientific_novelty:   'Научная новизна',
    practical_use:        'Практическая применимость',
    result_specificity:   'Конкретность результатов',
    socioeconomic_effect: 'Социально-экономический эффект',
    feasibility:          'Реалистичность исполнения',
    // legacy keys
    structure:   'Структура',
    goal:        'Цель',
    tasks:       'Задачи',
    consistency: 'Логика',
    results:     'Результаты',
    budget:      'Бюджет',
  };

  /* ── Load all projects ────────────────────────────────────────────────── */
  async function loadProjects() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    try {
      const resp = await fetch(API + '/api/projects');
      const data = await resp.json();
      allProjects = data.projects || [];
      updateStats();
      renderList();
    } catch (e) {
      showToast('Ошибка загрузки: ' + e.message, 'error');
    } finally {
      btn.classList.remove('spinning');
      document.getElementById('loading-overlay').style.display = 'none';
    }
  }

  /* ── Stats ───────────────────────────────────────────────────────────── */
  function updateStats() {
    document.getElementById('stat-total').textContent    = `Всего: ${allProjects.length}`;
    document.getElementById('stat-pending').textContent  = `На рассм.: ${allProjects.filter(p=>p.status==='pending').length}`;
    document.getElementById('stat-approved').textContent = `Одобрено: ${allProjects.filter(p=>p.status==='approved').length}`;
    document.getElementById('stat-rejected').textContent = `Отклонено: ${allProjects.filter(p=>p.status==='rejected').length}`;
  }

  /* ── Filter & search ─────────────────────────────────────────────────── */
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }
  function filterList() {
    currentSearch = document.getElementById('search-input').value.toLowerCase();
    renderList();
  }

  function getFiltered() {
    return allProjects.filter(p => {
      const matchFilter = currentFilter === 'all' || p.status === currentFilter;
      const matchSearch = !currentSearch ||
        p.project_name.toLowerCase().includes(currentSearch) ||
        p.full_name.toLowerCase().includes(currentSearch) ||
        p.iin.includes(currentSearch);
      return matchFilter && matchSearch;
    });
  }

  /* ── Render list ─────────────────────────────────────────────────────── */
  function renderList() {
    const list = document.getElementById('project-list');
    const projects = getFiltered();

    if (!projects.length) {
      list.innerHTML = `<div class="empty-list">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <div>Ничего не найдено</div>
      </div>`;
      return;
    }

    list.innerHTML = projects.map(p => {
      const score   = p.ai_analysis?.score;
      const scoreClass = score >= 70 ? 'high' : score >= 40 ? 'mid' : score != null ? 'low' : '';
      const scoreHtml  = score != null ? `<div class="pc-score ${scoreClass}">${score}/100</div>` : '';
      const date    = new Date(p.created_at).toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
      const isActive = p.id === activeId ? 'active' : '';
      return `
        <div class="project-card ${isActive}" onclick="openProject('${p.id}')">
          <div class="pc-top">
            <div class="pc-name" title="${esc(p.project_name)}">${esc(p.project_name)}</div>
            <span class="status-badge ${p.status}">${STATUS_LABELS[p.status]}</span>
          </div>
          <div class="pc-author">${esc(p.full_name)}</div>
          <div class="pc-date">${date}</div>
          ${scoreHtml}
        </div>
      `;
    }).join('');
  }

  /* ── Open project detail ─────────────────────────────────────────────── */
  async function openProject(id) {
    activeId = id;
    renderList();

    // Fetch fresh data
    try {
      const resp = await fetch(API + '/api/project?id=' + id);
      const data = await resp.json();
      renderDetail(data.project);
    } catch (e) {
      showToast('Ошибка: ' + e.message, 'error');
    }
  }

  /* ── Render detail ───────────────────────────────────────────────────── */
  function renderDetail(p) {
    const date = new Date(p.created_at).toLocaleDateString('ru-RU', {
      day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });

    const hasAnalysis = p.ai_analysis && p.ai_analysis.score != null;
    const analysisHtml = hasAnalysis ? buildAnalysisHtml(p) : '';
    const summaryHtml  = p.ai_summary
      ? `<div class="section">
          <div class="section-header"><h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Краткое описание от AI
          </h3></div>
          <div class="section-body"><div class="summary-text">${esc(p.ai_summary)}</div></div>
        </div>`
      : '';

    const actionsHtml = buildActionsHtml(p);

    document.getElementById('main-panel').innerHTML = `
      <div class="detail">
        <!-- Header -->
        <div class="detail-header">
          <div>
            <div class="detail-title">${esc(p.project_name)}</div>
            <div class="detail-meta">
              <span class="meta-chip">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                ${esc(p.full_name)}
              </span>
              <span class="meta-chip">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${date}
              </span>
              <span class="status-badge ${p.status}" style="font-size:11px;">${STATUS_LABELS[p.status]}</span>
            </div>
          </div>
        </div>

        <!-- Personal info -->
        <div class="section">
          <div class="section-header">
            <h3>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#008AE5" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              Данные заявителя
            </h3>
          </div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><div class="label">ФИО</div><div class="value">${esc(p.full_name)}</div></div>
              <div class="info-item"><div class="label">ИИН</div><div class="value mono">${esc(p.iin)}</div></div>
              <div class="info-item"><div class="label">WhatsApp</div><div class="value">${esc(p.whatsapp)}</div></div>
              <div class="info-item"><div class="label">Файл</div><div class="value">
                ${p.file_url
                  ? `<a href="${p.file_url}" target="_blank" class="file-link">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                      Открыть документ
                    </a>`
                  : '<span style="color:var(--gray-400);">Нет файла</span>'}
              </div></div>
            </div>
          </div>
        </div>

        <!-- Description -->
        ${p.description ? `
        <div class="section">
          <div class="section-header">
            <h3>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#008AE5" stroke-width="2"><path d="M9 2H4a2 2 0 00-2 2v16a2 2 0 002 2h16a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
              Описание
            </h3>
          </div>
          <div class="section-body"><div class="desc-text">${esc(p.description)}</div></div>
        </div>` : ''}

        <!-- AI Analysis -->
        <div class="section">
          <div class="section-header">
            <h3>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#008AE5" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              ИИ Анализ
            </h3>
            ${!hasAnalysis ? `
            <button class="btn-analyze" id="btn-analyze-${p.id}" onclick="runAnalysis('${p.id}')">
              <div class="spinner2"></div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Запустить анализ
            </button>` : ''}
          </div>
          <div class="section-body" id="analysis-body-${p.id}">
            ${hasAnalysis ? analysisHtml : `<div style="color:var(--gray-400);font-size:13px;text-align:center;padding:20px 0;">Нажмите «Запустить анализ» для проверки проекта</div>`}
          </div>
        </div>

        <!-- Groq summary -->
        ${summaryHtml}

        <!-- Decision / Actions -->
        <div class="section">
          <div class="section-header">
            <h3>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#008AE5" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              Решение
            </h3>
          </div>
          <div class="section-body" id="decision-body-${p.id}">
            ${actionsHtml}
          </div>
        </div>
      </div>
    `;

    // Animate score ring
    if (hasAnalysis && p.ai_analysis.score != null) {
      setTimeout(() => animateRing(p.ai_analysis.score), 100);
    }
  }

  /* ── Analysis HTML ───────────────────────────────────────────────────── */
  function buildAnalysisHtml(p) {
    const a     = p.ai_analysis;
    const score = a.score ?? 0;
    const sClass = score >= 70 ? 'high' : score >= 40 ? 'mid' : 'low';
    const sLabel = { approved: 'Одобрен', needs_revision: 'Требует доработки', rejected: 'Отклонён' }[a.status] || a.status;

    const circumference = 2 * Math.PI * 36;

    const criteriaHtml = a.criteria ? Object.entries(a.criteria).map(([key, val]) => `
      <div class="criterion">
        <div class="crit-dot ${val.passed ? 'pass' : 'fail'}">${val.passed ? '✓' : '✗'}</div>
        <div class="crit-info">
          <div class="crit-name">${CRITERIA_NAMES[key] || val.label || key}</div>
          <div class="crit-score">${val.score} / ${val.max} баллов</div>
          <div class="crit-comment">${esc(val.comment || '')}</div>
        </div>
      </div>
    `).join('') : '';

    const errorsHtml = (a.errors||[]).map(e => `
      <div class="issue-item error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        ${esc(e)}
      </div>`).join('');

    const warnsHtml = (a.warnings||[]).map(w => `
      <div class="issue-item warning">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        ${esc(w)}
      </div>`).join('');

    return `
      <div class="score-ring">
        <div class="ring-wrap">
          <svg class="ring-svg" width="90" height="90" viewBox="0 0 90 90">
            <circle class="ring-bg"   cx="45" cy="45" r="36"/>
            <circle class="ring-fill ${sClass}" id="ring-fill" cx="45" cy="45" r="36"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"/>
          </svg>
          <div class="ring-text">
            <div class="ring-score" id="ring-score-val">0</div>
            <div class="ring-label">/ 100</div>
          </div>
        </div>
        <div class="score-info">
          <h4 class="${a.status}">${sLabel}</h4>
          <p>${esc(a.summary || '')}</p>
        </div>
      </div>
      ${criteriaHtml ? `<div class="criteria-grid">${criteriaHtml}</div>` : ''}
      ${errorsHtml ? `<div style="margin-top:16px;"><div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px;">ОШИБКИ</div><div class="issue-list">${errorsHtml}</div></div>` : ''}
      ${warnsHtml  ? `<div style="margin-top:12px;"><div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px;">ПРЕДУПРЕЖДЕНИЯ</div><div class="issue-list">${warnsHtml}</div></div>` : ''}
    `;
  }

  /* ── Animate ring ─────────────────────────────────────────────────────── */
  function animateRing(score) {
    const ring = document.getElementById('ring-fill');
    const numEl = document.getElementById('ring-score-val');
    if (!ring || !numEl) return;
    const circumference = 2 * Math.PI * 36;
    const offset = circumference - (score / 100) * circumference;
    ring.style.strokeDashoffset = offset;
    let current = 0;
    const step = score / 40;
    const timer = setInterval(() => {
      current = Math.min(current + step, score);
      numEl.textContent = Math.round(current);
      if (current >= score) clearInterval(timer);
    }, 25);
  }

  /* ── Actions HTML ─────────────────────────────────────────────────────── */
  function buildActionsHtml(p) {
    if (p.status === 'approved') {
      return `<div class="decision-badge approved">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Проект одобрен
      </div>`;
    }
    if (p.status === 'rejected') {
      return `<div class="decision-badge rejected">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Проект отклонён
      </div>
      ${p.rejection_reason ? `<div class="rejection-reason-box"><strong>Причина:</strong> ${esc(p.rejection_reason)}</div>` : ''}`;
    }
    return `
      <div class="actions-row">
        <button class="btn-approve" onclick="approveProject('${p.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Одобрить
        </button>
        <button class="btn-reject" onclick="showRejectForm('${p.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Отклонить
        </button>
      </div>
      <div class="reject-form" id="reject-form-${p.id}">
        <textarea id="reject-reason-${p.id}" placeholder="Укажите причину отклонения..."></textarea>
        <button class="btn-reject-confirm" onclick="rejectProject('${p.id}')">Подтвердить отклонение</button>
      </div>
    `;
  }

  /* ── Run AI analysis ─────────────────────────────────────────────────── */
  async function runAnalysis(id) {
    const btn = document.getElementById('btn-analyze-' + id);
    if (!btn) return;
    btn.disabled = true;
    btn.classList.add('loading');

    const body = document.getElementById('analysis-body-' + id);
    if (body) body.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--gray-400);">
      <div style="display:flex;justify-content:center;gap:8px;margin-bottom:10px;">
        <div style="width:8px;height:8px;background:var(--blue);border-radius:50%;animation:bounce .8s ease-in-out infinite;"></div>
        <div style="width:8px;height:8px;background:var(--blue);border-radius:50%;animation:bounce .8s ease-in-out .15s infinite;"></div>
        <div style="width:8px;height:8px;background:var(--blue);border-radius:50%;animation:bounce .8s ease-in-out .3s infinite;"></div>
      </div>
      Анализ проекта с помощью ИИ...
    </div>`;

    try {
      const resp = await fetch(API + '/api/analyze', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ id }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Ошибка анализа');

      showToast('Анализ завершён!', 'success');

      // Update in allProjects
      const idx = allProjects.findIndex(p => p.id === id);
      if (idx >= 0) {
        allProjects[idx].ai_analysis = data.analysis;
        allProjects[idx].ai_summary  = data.summary;
      }
      updateStats();
      renderList();

      // Re-fetch and re-render detail
      const r2 = await fetch(API + '/api/project?id=' + id);
      const d2 = await r2.json();
      renderDetail(d2.project);

    } catch (e) {
      showToast('Ошибка: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.classList.remove('loading'); }
      if (body) body.innerHTML = `<div style="color:var(--red);font-size:13px;padding:10px 0;">${esc(e.message)}</div>`;
    }
  }

  /* ── Approve ─────────────────────────────────────────────────────────── */
  async function approveProject(id) {
    if (!confirm('Одобрить проект?')) return;
    try {
      const resp = await fetch(API + '/api/approve', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ id }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error);

      showToast('Проект одобрен!', 'success');
      const idx = allProjects.findIndex(p => p.id === id);
      if (idx >= 0) allProjects[idx].status = 'approved';
      updateStats(); renderList();

      const decBody = document.getElementById('decision-body-' + id);
      if (decBody) decBody.innerHTML = buildActionsHtml({ ...allProjects[idx], status: 'approved' });

    } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
  }

  /* ── Reject ──────────────────────────────────────────────────────────── */
  function showRejectForm(id) {
    document.getElementById('reject-form-' + id)?.classList.toggle('show');
  }

  async function rejectProject(id) {
    const reason = document.getElementById('reject-reason-' + id)?.value.trim();
    if (!reason) { showToast('Укажите причину отклонения', 'error'); return; }

    try {
      const resp = await fetch(API + '/api/reject', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ id, reason }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error);

      showToast('Проект отклонён', 'success');
      const idx = allProjects.findIndex(p => p.id === id);
      if (idx >= 0) { allProjects[idx].status = 'rejected'; allProjects[idx].rejection_reason = reason; }
      updateStats(); renderList();

      const decBody = document.getElementById('decision-body-' + id);
      if (decBody) decBody.innerHTML = buildActionsHtml({ ...allProjects[idx] });

    } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
  }

  /* ── Toast ───────────────────────────────────────────────────────────── */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ── Util ────────────────────────────────────────────────────────────── */
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  /* ── Init ────────────────────────────────────────────────────────────── */
  loadProjects();
  setInterval(loadProjects, 30000); // auto-refresh every 30s
</script>
</body>
</html>
